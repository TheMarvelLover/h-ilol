 <button class="subscribe">
  SUBSCRIBE
</button>

 <style>
  .subscribe {
background-color: rgb(200, 0, 0);
color: rgb(255, 255, 255);
border: none;
height: 30px;
width: 90px;
border-radius: 3px;
cursor:pointer;
margin-right: 8px;
transition: opacity 0.2s;
  }

.subscribe:hover{
  opacity:0.6;
}
 
.subscribe:active{
opacity :0.4;

}
</style> 



<button class="Join_button">
  JOIN
</button>



<style>
  .Join_button{
    background-color: white;
    color: aqua;
    border-color: blue;
    border-style: solid;
    border-width: 1px;
    height:  35px;
    width: 67px;
    border-radius:5px;
    cursor:pointer; 
    margin-right: 10px;
    transition: background-color 1s , color 1s;
   




  }


  .Join_button:hover{
    background-color :darkgreen;
    color:red;

  }
  .Join_button:active{
    opacity:0.4;
  }
</style>



<button class="tweet"> 
  Tweet 
</button>

<Style>


.tweet {
  background-color: lightblue;
  color: RGB(0,0,0);
